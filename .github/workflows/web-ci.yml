name: web-ci
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      package-manager:
        type: string
        default: "npm"
      working-directory:
        description: Directory containing the app's package.json (for repos where the JS app is not at the repo root)
        type: string
        default: "."
permissions:
  contents: read
concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      PKG_MGR: ${{ inputs.package-manager }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: $PKG_MGR ci
      - name: Typecheck
        run: $PKG_MGR run typecheck
      - name: Lint
        run: $PKG_MGR run lint
      - name: Test
        run: $PKG_MGR run test:run
      - name: Build
        run: $PKG_MGR run build
