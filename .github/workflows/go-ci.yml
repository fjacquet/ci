name: go-ci
on:
  workflow_call:
    inputs:
      go-version: { type: string, default: "" }
    secrets:
      CODECOV_TOKEN: { required: false }
permissions:
  contents: read
concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: fjacquet/ci/actions/setup-go-cache@v1 # nosemgrep: github-actions.security.third-party-action-not-pinned-to-commit-sha
        with: { go-version: "${{ inputs.go-version }}" }
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0 — for uvx semgrep/codecov in make targets
      - run: make tools
      - run: make ci
      - run: make sbom
      - run: make coverage-upload
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
