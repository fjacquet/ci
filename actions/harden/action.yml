name: harden
description: Apply step-security harden-runner egress audit
inputs:
  egress-policy:
    description: audit or block
    default: audit
runs:
  using: composite
  steps:
    - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: ${{ inputs.egress-policy }}
