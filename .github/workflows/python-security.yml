name: python-security
on:
  workflow_call:
    inputs:
      python-version: { type: string, default: "3.12" }
permissions:
  contents: read
concurrency:
  group: python-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }
      - uses: fjacquet/ci/actions/setup-uv@v1 # nosemgrep: github-actions.security.third-party-action-not-pinned-to-commit-sha
        with: { python-version: "${{ inputs.python-version }}" }
      - run: make install
      - run: make security
      - run: make vuln
