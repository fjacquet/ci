name: python-ci
on:
  workflow_call:
    inputs:
      python-version: { type: string, default: "3.12" }
      working-directory:
        description: Directory containing the Python project's Makefile/pyproject (for repos where it is not at the repo root)
        type: string
        default: "."
    secrets:
      CODECOV_TOKEN: { required: false }
permissions:
  contents: read
concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { fetch-depth: 0, persist-credentials: false }
      - uses: fjacquet/ci/actions/setup-uv@v1 # nosemgrep: github-actions.security.third-party-action-not-pinned-to-commit-sha
        with: { python-version: "${{ inputs.python-version }}" }
      - run: make install
      - run: make ci
      - run: make sbom
      - run: make coverage-upload
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
