name: python-security
on:
  workflow_call:
    inputs:
      python-version: { type: string, default: "3.12" }
      working-directory:
        description: Directory containing the Python project's Makefile/pyproject (for repos where it is not at the repo root)
        type: string
        default: "."
permissions:
  contents: read
concurrency:
  group: python-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with: { egress-policy: audit }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: fjacquet/ci/actions/setup-uv@v1 # nosemgrep: github-actions.security.third-party-action-not-pinned-to-commit-sha
        with: { python-version: "${{ inputs.python-version }}" }
      - run: make install
      - run: make security
      - run: make vuln
