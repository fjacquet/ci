name: self-check
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: self-check-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false
      - name: actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: zizmor
        run: uvx zizmor --format=github .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: pinact check
        run: |
          go install github.com/suzuki-shunsuke/pinact/v4/cmd/pinact@v4.1.0
          # Exclude first-party fjacquet/* refs: they are intentionally ref-pinned to the
          # moving @v1 tag (per the zizmor unpinned-uses policy), not SHA-pinned.
          "$(go env GOPATH)/bin/pinact" run --check --exclude '^fjacquet/'
