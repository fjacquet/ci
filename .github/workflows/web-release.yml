name: web-release
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      package-manager:
        type: string
        default: "npm"
      build-dir:
        type: string
        default: "dist"
      archive-name:
        description: Base name for release archives. Defaults to the repository name.
        type: string
        default: ""
      publish-npm:
        description: Publish the package to GitHub Packages (npm registry).
        type: boolean
        default: true
      publish-docker:
        description: Build and push a Docker image to ghcr.io.
        type: boolean
        default: true
      docker-context:
        type: string
        default: "."
permissions:
  contents: read
jobs:
  # ── Shared build (gates the release on typecheck/lint/test) ──────────────────
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PKG_MGR: ${{ inputs.package-manager }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install
        run: $PKG_MGR ci
      - name: Typecheck
        run: $PKG_MGR run typecheck
      - name: Lint
        run: $PKG_MGR run lint
      - name: Test
        run: $PKG_MGR run test:run
      - name: Build
        run: $PKG_MGR run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: ${{ inputs.build-dir }}/
          retention-days: 1

  # ── GitHub Release ───────────────────────────────────────────────────────────
  github-release:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write       # OIDC for build-provenance attestation
      attestations: write   # write the provenance attestation
    env:
      ARCHIVE_NAME: ${{ inputs.archive-name || github.event.repository.name }}
      BUILD_DIR: ${{ inputs.build-dir }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: ${{ inputs.build-dir }}/
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Create archives
        run: |
          zip -r "${ARCHIVE_NAME}-${GITHUB_REF_NAME}.zip" "$BUILD_DIR"
          tar czf "${ARCHIVE_NAME}-${GITHUB_REF_NAME}.tar.gz" "$BUILD_DIR"
      - name: Checksums
        run: |
          sha256sum \
            "${ARCHIVE_NAME}-${GITHUB_REF_NAME}.zip" \
            "${ARCHIVE_NAME}-${GITHUB_REF_NAME}.tar.gz" \
            sbom.cyclonedx.json > SHA256SUMS
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ env.ARCHIVE_NAME }}-${{ github.ref_name }}.zip
            ${{ env.ARCHIVE_NAME }}-${{ github.ref_name }}.tar.gz
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            "${ARCHIVE_NAME}-${GITHUB_REF_NAME}.zip"
            "${ARCHIVE_NAME}-${GITHUB_REF_NAME}.tar.gz"
            sbom.cyclonedx.json
            SHA256SUMS
          )
          # Upsert: a release may already exist (manual creation, or a re-run of
          # this workflow). `gh release create` is not idempotent, so create only
          # when absent and otherwise upload assets with --clobber.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --generate-notes
          fi

  # ── npm → GitHub Packages ────────────────────────────────────────────────────
  npm-publish:
    if: ${{ inputs.publish-npm }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    env:
      PKG_MGR: ${{ inputs.package-manager }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          registry-url: "https://npm.pkg.github.com"
      - run: $PKG_MGR ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: ${{ inputs.build-dir }}/
      - name: Publish to GitHub Packages
        # zizmor: ignore[use-trusted-publishing]
        # GitHub Packages auth uses NODE_AUTH_TOKEN; npm OIDC trusted
        # publishing is npmjs.org-only and not applicable here.
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker → ghcr.io ─────────────────────────────────────────────────────────
  docker:
    if: ${{ inputs.publish-docker }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ inputs.docker-context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
